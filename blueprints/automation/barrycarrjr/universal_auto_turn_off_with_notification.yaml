blueprint:
  name: Universal Auto Turn Off (Reboot-Safe)
  description: >
    Automatically turns off any switch, light, input_boolean, or climate entity
    after it has been continuously active for a specified duration.

    Reboot-Safe / Reload-Safe: catches the case where the entity is already in
    the matched state when the trigger attaches (HA restart, automation reload,
    or blueprint update). A periodic re-check (every 5 minutes) evaluates
    last_changed against max_on_duration, so even a missed edge will be cleaned
    up within 5 minutes of the timer expiring.

    Uses a state trigger with `not_to` so any non-off state arms the timer.
    `unavailable` is excluded from `not_to`, so it does not trigger on
    flap-recovery, but a long flap will reset the for-clock — acceptable for
    stable integrations.
  domain: automation
  input:
    target_entity:
      name: Target Entity
      description: Entity to monitor and auto-turn-off
      selector:
        entity:
          domain:
            - switch
            - light
            - input_boolean
            - climate

    max_on_duration:
      name: Max On Duration
      description: Time before entity should be turned off
      default: "01:00:00"
      selector:
        duration:

mode: single

variables:
  entity_id: !input target_entity
  entity_domain: "{{ entity_id.split('.')[0] }}"
  max_on_duration: !input max_on_duration
  max_seconds: >-
    {{ (max_on_duration.hours | default(0)) * 3600
       + (max_on_duration.minutes | default(0)) * 60
       + (max_on_duration.seconds | default(0)) }}

trigger:
  - platform: state
    entity_id: !input target_entity
    not_to:
      - "off"
      - "unknown"
      - "unavailable"
    for: !input max_on_duration
    id: state_for
  - platform: homeassistant
    event: start
    id: ha_start
  - platform: time_pattern
    minutes: "/5"
    id: periodic

condition:
  - condition: template
    value_template: >-
      {% if trigger.id == 'state_for' %}
        true
      {% else %}
        {% set e = states[entity_id] %}
        {{ e is not none
           and e.state not in ['off', 'unknown', 'unavailable']
           and (now() - e.last_changed).total_seconds() >= (max_seconds | int) }}
      {% endif %}

action:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ entity_domain in ['switch', 'light', 'input_boolean'] }}"
        sequence:
          - service: "{{ entity_domain }}.turn_off"
            target:
              entity_id: "{{ entity_id }}"

      - conditions:
          - condition: template
            value_template: "{{ entity_domain == 'climate' }}"
        sequence:
          - service: climate.set_hvac_mode
            target:
              entity_id: "{{ entity_id }}"
            data:
              hvac_mode: "off"